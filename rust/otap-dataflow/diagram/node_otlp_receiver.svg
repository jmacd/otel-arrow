<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="850" viewBox="0 0 1600 850" font-family="Inter, 'Helvetica Neue', Arial, sans-serif"><rect width="1600" height="850" fill="#ffffff"/><defs><marker id="ah-pdata" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse" markerUnits="userSpaceOnUse"><path d="M0,0 L10,5 L0,10 z" fill="context-stroke"/></marker><marker id="ah-ctrl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse" markerUnits="userSpaceOnUse"><path d="M0,1 L10,5 L0,9" fill="none" stroke="context-stroke" stroke-width="1.4"/></marker></defs><rect x="80" y="80" width="1440" height="2" fill="#b15a4f"/><text x="80" y="62" font-size="34" font-weight="600" fill="#1f2933">otlp_receiver</text><text x="1520" y="62" font-size="20" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d" text-anchor="end">urn:otel:receiver:otlp</text><text x="80" y="120" font-size="24" font-style="italic" fill="#52606d"><tspan x="80" dy="0">Ingests OTLP/gRPC and OTLP/HTTP exports as lazily-decoded</tspan><tspan x="80" dy="28">OTLP byte payloads.</tspan></text><text x="1223" y="104" text-anchor="end" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">protocols.grpc</text><text x="1520" y="104" text-anchor="end" font-size="17" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">Option&lt;GrpcServerSettings&gt;</text><text x="1223" y="126" text-anchor="end" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">protocols.http</text><text x="1520" y="126" text-anchor="end" font-size="17" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">Option&lt;HttpServerSettings&gt;</text><text x="800.0" y="260" text-anchor="middle" font-size="26" font-weight="700" fill="#1f2933">otlp_receiver</text><g><rect x="440.0" y="278" width="720" height="320" rx="10" ry="10" fill="white" stroke="#52606d" stroke-width="1.6"/><rect x="440.0" y="278" width="720" height="6" rx="3" ry="3" fill="#b15a4f"/><text x="800.0" y="306" text-anchor="middle" font-size="26" font-weight="600" fill="#1f2933"></text></g><text x="460.0" y="316" font-size="20" fill="#1f2933">Ack subscription registry</text><text x="460.0" y="342" font-size="20" fill="#1f2933">Shared admission state</text><text x="810.0" y="316" font-size="20" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">notify_receiver_drained</text><text x="810.0" y="342" font-size="20" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">send_message</text><text x="810.0" y="368" font-size="20" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">subscribe_to</text><text x="810.0" y="394" font-size="20" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">tcp_listener</text><line x1="80" y1="384.66666666666663" x2="440.0" y2="384.66666666666663" stroke="#b15a4f" stroke-width="3.0" stroke-linecap="round" marker-end="url(#ah-pdata)"/><line x1="1160.0" y1="384.66666666666663" x2="1520" y2="384.66666666666663" stroke="#b15a4f" stroke-width="3.0" stroke-linecap="round" marker-end="url(#ah-pdata)"/><g><rect x="1170.0" y="350.66666666666663" width="76" height="28" rx="5" ry="5" fill="#b15a4f" stroke="#b15a4f"/><text x="1208.0" y="369.66666666666663" text-anchor="middle" font-size="16" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="white">OTLP</text></g><line x1="1520" y1="512.6666666666666" x2="1160.0" y2="512.6666666666666" stroke="#52606d" stroke-width="1.4" marker-end="url(#ah-ctrl)"/><line x1="440.0" y1="512.6666666666666" x2="80" y2="512.6666666666666" stroke="#52606d" stroke-width="1.4" marker-end="url(#ah-ctrl)"/><text x="80" y="376.66666666666663" text-anchor="start" font-size="14" fill="#1f2933">gRPC / HTTP</text><text x="80" y="504.66666666666663" text-anchor="start" font-size="14" fill="#1f2933">gRPC / HTTP status</text><text x="1520" y="376.66666666666663" text-anchor="end" font-size="14" fill="#1f2933">PData</text><text x="1520" y="504.66666666666663" text-anchor="end" font-size="14" fill="#1f2933">Ack/Nack</text><rect x="1300.0" y="276.66666666666663" width="220" height="46" rx="3" ry="3" fill="white" stroke="#c9b458" stroke-width="1" stroke-dasharray="2,2"/><text x="1314.0" y="305.66666666666663" font-size="16" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">slot</text><text x="1506.0" y="305.66666666666663" text-anchor="end" font-size="16" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">SlotKey</text><line x1="1410.0" y1="322.66666666666663" x2="1410.0" y2="380.66666666666663" stroke="#c9b458" stroke-width="1" stroke-dasharray="2,2"/><line x1="451.0" y1="632" x2="451.0" y2="606" stroke="#52606d" stroke-width="1.4" marker-end="url(#ah-ctrl)"/><line x1="473.0" y1="606" x2="473.0" y2="632" stroke="#52606d" stroke-width="1.4" marker-end="url(#ah-ctrl)"/><text x="440.0" y="650" font-size="14" font-style="italic" fill="#52606d">control</text><text x="440.0" y="672" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">CollectTelemetry</text><text x="440.0" y="694" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">DrainIngress</text><text x="440.0" y="716" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">MemoryPressureChanged</text><text x="440.0" y="738" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">Shutdown</text><line x1="691.0" y1="632" x2="691.0" y2="606" stroke="#52606d" stroke-width="1.4" marker-end="url(#ah-ctrl)"/><text x="680.0" y="650" font-size="14" font-style="italic" fill="#52606d">ack/nack</text><text x="680.0" y="672" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">Receive</text><rect x="820" y="640" width="700" height="180" rx="10" ry="10" fill="#f4f6f8" stroke="#9aa5b1" stroke-width="1"/><text x="844" y="680" font-size="16" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">1.</text><text x="870" y="680" font-size="16" fill="#1f2933">At least one protocol (gRPC and/or HTTP) must be configured; default ports</text><text x="870" y="700" font-size="16" fill="#1f2933">mirror the Go collector (4317 / 4318).</text><text x="844" y="728" font-size="16" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">2.</text><text x="870" y="728" font-size="16" fill="#1f2933">Request bodies stay in serialized OTLP form via OtlpBytesCodec; downstream</text><text x="870" y="748" font-size="16" fill="#1f2933">stages decode lazily.</text><text x="844" y="776" font-size="16" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">3.</text><text x="870" y="776" font-size="16" fill="#1f2933">wait_for_result holds the response until the immediate downstream Acks/Nacks;</text><text x="870" y="796" font-size="16" fill="#1f2933">otherwise responses return immediately.</text><text x="844" y="824" font-size="16" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">4.</text><text x="870" y="824" font-size="16" fill="#1f2933">max_concurrent_requests defaults to 0 = adopt the downstream pdata channel</text><text x="870" y="844" font-size="16" fill="#1f2933">capacity; non-zero values are clamped to it.</text><text x="844" y="872" font-size="16" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">5.</text><text x="870" y="872" font-size="16" fill="#1f2933">MemoryPressureChanged feeds the shared admission state so ingress sheds load</text><text x="870" y="892" font-size="16" fill="#1f2933">when the process is under pressure.</text><text x="844" y="920" font-size="16" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">6.</text><text x="870" y="920" font-size="16" fill="#1f2933">DrainIngress closes both listeners and waits for in-flight wait_for_result</text><text x="870" y="940" font-size="16" fill="#1f2933">requests to settle before notifying drained.</text><text x="844" y="968" font-size="16" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">7.</text><text x="870" y="968" font-size="16" fill="#1f2933">TLS / mTLS are configured per protocol.</text></svg>