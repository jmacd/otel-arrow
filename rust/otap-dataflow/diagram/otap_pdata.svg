<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="850" viewBox="0 0 1600 850" font-family="Inter, 'Helvetica Neue', Arial, sans-serif"><rect width="1600" height="850" fill="#ffffff"/><defs><marker id="ah-pdata" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse" markerUnits="userSpaceOnUse"><path d="M0,0 L10,5 L0,10 z" fill="context-stroke"/></marker><marker id="ah-ctrl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse" markerUnits="userSpaceOnUse"><path d="M0,1 L10,5 L0,9" fill="none" stroke="context-stroke" stroke-width="1.4"/></marker></defs><rect x="80" y="60" width="1440" height="2" fill="#4f7a8a"/><text x="80" y="42" font-size="34" font-weight="600" fill="#1f2933">OtapPdata anatomy</text><text x="1520" y="42" font-size="20" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d" text-anchor="end">Context (stack of Frames) + payload (OTAP | OTLP)</text><text x="80" y="90" font-size="20" font-style="italic" fill="#52606d">Anatomy of the in-flight value carried on every pdata edge: a Context (unwind path) plus a payload (telemetry).</text><rect x="80" y="130" width="720" height="510" rx="14" ry="14" fill="white" stroke="#52606d" stroke-width="1.6"/><rect x="80" y="130" width="720" height="6" rx="3" ry="3" fill="#4f7a8a"/><text x="102" y="164" font-size="26" font-weight="700" fill="#1f2933">OtapPdata</text><text x="784" y="160" text-anchor="end" font-size="18" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">crates/otap/src/pdata.rs:402</text><text x="102" y="182" font-size="18" font-style="italic" fill="#52606d">two fields: a Context (left) and a payload (right)</text><rect x="102" y="186" width="676" height="360" rx="10" ry="10" fill="#f4f6f8" stroke="#9aa5b1" stroke-width="1"/><text x="116" y="208" font-size="20" font-weight="700" fill="#1f2933">context: Context</text><text x="764" y="208" text-anchor="end" font-size="14" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">crates/otap/src/pdata.rs:41</text><rect x="124.0" y="450" width="310.0" height="40" rx="5" ry="5" fill="white" stroke="#9aa5b1" stroke-width="1"/><text x="132.0" y="468" font-size="16" font-family="'JetBrains Mono', Menlo, Consolas, monospace" font-weight="700" fill="#1f2933">transport_headers</text><text x="132.0" y="484" font-size="14" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">Option&lt;TransportHeaders&gt;</text><rect x="446.0" y="450" width="310.0" height="40" rx="5" ry="5" fill="white" stroke="#9aa5b1" stroke-width="1"/><text x="454.0" y="468" font-size="16" font-family="'JetBrains Mono', Menlo, Consolas, monospace" font-weight="700" fill="#1f2933">flow_compute_ns</text><text x="454.0" y="484" font-size="14" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">Option&lt;NonZeroU64&gt;</text><text x="124" y="236" font-size="18" font-weight="700" fill="#1f2933">stack: Vec&lt;Frame&gt;</text><text x="124" y="254" font-size="14" font-style="italic" fill="#52606d">pushed by subscribe_to() · popped on Ack/Nack</text><rect x="124" y="386" width="380" height="50" rx="6" ry="6" fill="white" stroke="#52606d" stroke-width="1.6"/><rect x="124" y="386" width="6" height="50" rx="3" ry="3" fill="#52606d"/><text x="140" y="406" font-size="16" font-family="'JetBrains Mono', Menlo, Consolas, monospace" font-weight="700" fill="#1f2933">Frame</text><text x="194" y="406" font-size="16" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">node_id=7  otlp_grpc_exporter</text><text x="140" y="426" font-size="14" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">Ack|Nack|Producer</text><rect x="124" y="328" width="380" height="50" rx="6" ry="6" fill="white" stroke="#4f7a8a" stroke-width="1.6"/><rect x="124" y="328" width="6" height="50" rx="3" ry="3" fill="#4f7a8a"/><text x="140" y="348" font-size="16" font-family="'JetBrains Mono', Menlo, Consolas, monospace" font-weight="700" fill="#1f2933">Frame</text><text x="194" y="348" font-size="16" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">node_id=4  batch_processor</text><text x="140" y="368" font-size="14" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">Ack|Nack|EntryTs|Producer|ProcDur</text><rect x="124" y="270" width="380" height="50" rx="6" ry="6" fill="white" stroke="#52606d" stroke-width="1.6"/><rect x="124" y="270" width="6" height="50" rx="3" ry="3" fill="#52606d"/><text x="140" y="290" font-size="16" font-family="'JetBrains Mono', Menlo, Consolas, monospace" font-weight="700" fill="#1f2933">Frame</text><text x="194" y="290" font-size="16" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">node_id=1  otlp_receiver</text><text x="140" y="310" font-size="14" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">Ack|Nack|Return</text><text x="522" y="300.0" font-size="14" font-style="italic" fill="#4f7a8a">← top of stack</text><text x="124" y="450" font-size="16" font-style="italic" fill="#52606d">↑ stack grows upward as nodes call subscribe_to()</text><rect x="828" y="130" width="692" height="220" rx="14" ry="14" fill="white" stroke="#52606d" stroke-width="1.6"/><rect x="828" y="130" width="346.0" height="6" fill="#4f7a8a"/><rect x="1174.0" y="130" width="346.0" height="6" fill="#b15a4f"/><text x="850" y="164" font-size="26" font-weight="700" fill="#1f2933">payload: OtapPayload</text><text x="1506" y="160" text-anchor="end" font-size="16" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">crates/pdata/src/payload.rs:104</text><text x="850" y="186" font-size="18" font-style="italic" fill="#52606d">tagged enum: exactly one variant present at a time</text><rect x="850.0" y="212" width="316.0" height="118" rx="8" ry="8" fill="white" stroke="#4f7a8a" stroke-width="1.6"/><rect x="850.0" y="212" width="316.0" height="6" rx="3" ry="3" fill="#4f7a8a"/><rect x="1102.0" y="226" width="56" height="22" rx="5" ry="5" fill="#4f7a8a" stroke="#4f7a8a"/><text x="1130.0" y="242.0" text-anchor="middle" font-size="16" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="white">OTAP</text><text x="866.0" y="248" font-size="18" font-weight="700" fill="#1f2933">OtapArrowRecords</text><text x="866.0" y="268" font-size="16" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">Arrow RecordBatches</text><text x="1008.0" y="318" text-anchor="middle" font-size="16" font-style="italic" fill="#52606d">columnar; Arrow IPC ready</text><rect x="1182.0" y="212" width="316.0" height="118" rx="8" ry="8" fill="white" stroke="#b15a4f" stroke-width="1.6"/><rect x="1182.0" y="212" width="316.0" height="6" rx="3" ry="3" fill="#b15a4f"/><rect x="1434.0" y="226" width="56" height="22" rx="5" ry="5" fill="#b15a4f" stroke="#b15a4f"/><text x="1462.0" y="242.0" text-anchor="middle" font-size="16" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="white">OTLP</text><text x="1198.0" y="248" font-size="18" font-weight="700" fill="#1f2933">OtlpBytes</text><text x="1198.0" y="268" font-size="16" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">OtlpProtoBytes</text><text x="1340.0" y="318" text-anchor="middle" font-size="16" font-style="italic" fill="#52606d">row-oriented; protobuf wire bytes</text><rect x="828" y="368" width="692" height="272" rx="14" ry="14" fill="white" stroke="#4f7a8a" stroke-width="1.6"/><rect x="828" y="368" width="692" height="6" rx="3" ry="3" fill="#4f7a8a"/><text x="850" y="400" font-size="20" font-weight="700" fill="#1f2933">Frame (exploded)</text><text x="1506" y="396" text-anchor="end" font-size="16" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">crates/engine/src/control.rs:138</text><text x="850" y="424" font-size="18" font-family="'JetBrains Mono', Menlo, Consolas, monospace" font-weight="700" fill="#1f2933">node_id: usize</text><text x="1090" y="424" font-size="16" font-style="italic" fill="#52606d">= 4 (return address · source node)</text><text x="850" y="450" font-size="18" font-family="'JetBrains Mono', Menlo, Consolas, monospace" font-weight="700" fill="#1f2933">interests: Interests</text><text x="1090" y="450" font-size="16" font-style="italic" fill="#52606d">8-bit flags (filled = set in this frame)</text><rect x="850" y="458" width="18" height="18" rx="3" ry="3" fill="#4f7a8a" stroke="#52606d" stroke-width="1"/><text x="859.0" y="471.0" text-anchor="middle" font-size="14" font-weight="700" fill="white">1</text><rect x="872" y="458" width="18" height="18" rx="3" ry="3" fill="#4f7a8a" stroke="#52606d" stroke-width="1"/><text x="881.0" y="471.0" text-anchor="middle" font-size="14" font-weight="700" fill="white">1</text><rect x="894" y="458" width="18" height="18" rx="3" ry="3" fill="white" stroke="#52606d" stroke-width="1"/><rect x="916" y="458" width="18" height="18" rx="3" ry="3" fill="#4f7a8a" stroke="#52606d" stroke-width="1"/><text x="925.0" y="471.0" text-anchor="middle" font-size="14" font-weight="700" fill="white">1</text><rect x="938" y="458" width="18" height="18" rx="3" ry="3" fill="white" stroke="#52606d" stroke-width="1"/><rect x="960" y="458" width="18" height="18" rx="3" ry="3" fill="#4f7a8a" stroke="#52606d" stroke-width="1"/><text x="969.0" y="471.0" text-anchor="middle" font-size="14" font-weight="700" fill="white">1</text><rect x="982" y="458" width="18" height="18" rx="3" ry="3" fill="white" stroke="#52606d" stroke-width="1"/><rect x="1004" y="458" width="18" height="18" rx="3" ry="3" fill="#4f7a8a" stroke="#52606d" stroke-width="1"/><text x="1013.0" y="471.0" text-anchor="middle" font-size="14" font-weight="700" fill="white">1</text><text x="859.0" y="490" font-size="13" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d" transform="rotate(-35,859.0,490)">ACKS</text><text x="881.0" y="490" font-size="13" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d" transform="rotate(-35,881.0,490)">NACKS</text><text x="903.0" y="490" font-size="13" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d" transform="rotate(-35,903.0,490)">RETURN_DATA</text><text x="925.0" y="490" font-size="13" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d" transform="rotate(-35,925.0,490)">ENTRY_TIMESTAMP</text><text x="947.0" y="490" font-size="13" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d" transform="rotate(-35,947.0,490)">CONSUMER_METRICS</text><text x="969.0" y="490" font-size="13" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d" transform="rotate(-35,969.0,490)">PRODUCER_METRICS</text><text x="991.0" y="490" font-size="13" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d" transform="rotate(-35,991.0,490)">SOURCE_TAGGING</text><text x="1013.0" y="490" font-size="13" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d" transform="rotate(-35,1013.0,490)">PROCESS_DURATION</text><text x="850" y="556" font-size="18" font-family="'JetBrains Mono', Menlo, Consolas, monospace" font-weight="700" fill="#1f2933">route: RouteData</text><text x="1090" y="556" font-size="16" font-style="italic" fill="#52606d">crates/engine/src/control.rs:102</text><text x="850" y="580" font-size="17" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">    calldata: CallData</text><text x="1110" y="580" font-size="16" font-style="italic" fill="#52606d">= SmallVec&lt;[Context8u8; 3]&gt;  (per-frame opaque data)</text><text x="850" y="600" font-size="17" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">    entry_time_ns: u64</text><text x="1110" y="600" font-size="16" font-style="italic" fill="#52606d">monotonic ns at subscribe_to() if ENTRY_TIMESTAMP set</text><text x="850" y="620" font-size="17" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">    output_port_index: u16</text><text x="1110" y="620" font-size="16" font-style="italic" fill="#52606d">producer's output port for this frame</text><path d="M504,353.0 L534,353.0 L798,384 L828,384" fill="none" stroke="#4f7a8a" stroke-width="1.4" stroke-dasharray="3,3"/><circle cx="504" cy="353.0" r="3" fill="#4f7a8a"/><rect x="80" y="658" width="1440" height="172" rx="10" ry="10" fill="#f4f6f8" stroke="#9aa5b1" stroke-width="1"/><text x="104" y="700" font-size="18" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">1.</text><text x="130" y="700" font-size="18" fill="#1f2933">Each node that calls effect_handler.subscribe_to(...) pushes one Frame; node_id is the unwind return address.</text><text x="104" y="730" font-size="18" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">2.</text><text x="130" y="730" font-size="18" fill="#1f2933">drain_to_next_subscriber walks the stack top-down on the return path and stops at the first matching frame.</text><text x="104" y="760" font-size="18" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">3.</text><text x="130" y="760" font-size="18" fill="#1f2933">If the same node subscribes twice, the top frame is updated in place: interests merge, calldata replaces.</text><text x="104" y="790" font-size="18" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">4.</text><text x="130" y="790" font-size="18" fill="#1f2933">transport_headers and flow_compute_ns sit on Context but are not part of any Frame; only headers survive topic hops.</text><text x="104" y="820" font-size="18" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">5.</text><text x="130" y="820" font-size="18" fill="#1f2933">OtapPayload variants are mutually exclusive; calldata is at most three 8-byte slots, larger state rides in payload.</text></svg>