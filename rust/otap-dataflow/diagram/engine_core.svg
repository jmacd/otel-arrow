<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="850" viewBox="0 0 1600 850" font-family="Inter, 'Helvetica Neue', Arial, sans-serif"><rect width="1600" height="850" fill="#ffffff"/><defs><marker id="ah-pdata" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse" markerUnits="userSpaceOnUse"><path d="M0,0 L10,5 L0,10 z" fill="context-stroke"/></marker><marker id="ah-ctrl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse" markerUnits="userSpaceOnUse"><path d="M0,1 L10,5 L0,9" fill="none" stroke="context-stroke" stroke-width="1.4"/></marker></defs><rect x="80" y="60" width="1440" height="2" fill="#4f7a8a"/><text x="80" y="42" font-size="34" font-weight="600" fill="#1f2933">Per-core pipeline thread</text><text x="1520" y="42" font-size="20" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d" text-anchor="end">RuntimePipeline (single-threaded tokio runtime)</text><text x="80" y="90" font-size="20" font-style="italic" fill="#52606d">Inside one core: every box below runs on the same OS thread and the same single-threaded tokio runtime.</text><rect x="220" y="130" width="1160" height="510" rx="14" ry="14" fill="white" stroke="#4f7a8a" stroke-width="2.0"/><rect x="220" y="130" width="1160" height="36" rx="14" ry="14" fill="#4f7a8a" fill-opacity="0.10"/><rect x="220" y="162" width="1160" height="4" fill="#4f7a8a"/><text x="240" y="154" font-size="18" font-weight="700" fill="#4f7a8a">pipeline thread (one core)</text><text x="1360" y="154" text-anchor="end" font-size="18" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">RuntimePipeline&lt;PData&gt;</text><text x="800.0" y="154" text-anchor="middle" font-size="18" font-style="italic" fill="#4f7a8a">1 OS thread · 1 tokio current_thread runtime · LocalSet (!Send tasks)</text><rect x="248" y="190" width="360" height="150" rx="10" ry="10" fill="white" stroke="#52606d" stroke-width="1.6"/><rect x="248" y="190" width="360" height="6" rx="3" ry="3" fill="#52606d"/><text x="264" y="220" font-size="20" font-weight="700" fill="#1f2933">RuntimeCtrlMsgManager</text><text x="264" y="238" font-size="14" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">pipeline_ctrl.rs:242</text><text x="264" y="260" font-size="16" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">local timer wheel  (DelayedData)</text><text x="264" y="280" font-size="16" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">tick_timers / telemetry_timers</text><text x="264" y="300" font-size="16" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">memory_pressure rx (watch)</text><text x="264" y="320" font-size="16" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">drains RuntimeCtrlMsgReceiver</text><rect x="992" y="190" width="360" height="150" rx="10" ry="10" fill="white" stroke="#52606d" stroke-width="1.6"/><rect x="992" y="190" width="360" height="6" rx="3" ry="3" fill="#52606d"/><text x="1008" y="220" font-size="20" font-weight="700" fill="#1f2933">PipelineCompletionMsgDispatcher</text><text x="1008" y="238" font-size="14" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">pipeline_ctrl.rs:888</text><text x="1008" y="260" font-size="16" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">routes Ack / Nack back to upstream</text><text x="1008" y="280" font-size="16" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">looks up node by id in ControlSenders</text><text x="1008" y="300" font-size="16" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">drains PipelineCompletionMsgReceiver</text><rect x="380.0" y="400" width="220" height="110" rx="10" ry="10" fill="white" stroke="#52606d" stroke-width="1.6"/><rect x="380.0" y="400" width="220" height="6" rx="3" ry="3" fill="#4f7a8a"/><text x="490.0" y="430" text-anchor="middle" font-size="20" font-weight="700" fill="#1f2933">receiver</text><text x="490.0" y="450" text-anchor="middle" font-size="16" font-style="italic" fill="#52606d">ingests external requests</text><text x="490.0" y="474" text-anchor="middle" font-size="16" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">ReceiverWrapper</text><rect x="690.0" y="400" width="220" height="110" rx="10" ry="10" fill="white" stroke="#52606d" stroke-width="1.6"/><rect x="690.0" y="400" width="220" height="6" rx="3" ry="3" fill="#4f7a8a"/><text x="800.0" y="430" text-anchor="middle" font-size="20" font-weight="700" fill="#1f2933">processor</text><text x="800.0" y="450" text-anchor="middle" font-size="16" font-style="italic" fill="#52606d">transforms / filters</text><text x="800.0" y="474" text-anchor="middle" font-size="16" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">ProcessorWrapper</text><text x="800.0" y="496" text-anchor="middle" font-size="16" font-style="italic" fill="#4f7a8a">+ NodeLocalScheduler (delayed resume)</text><rect x="1000.0" y="400" width="220" height="110" rx="10" ry="10" fill="white" stroke="#52606d" stroke-width="1.6"/><rect x="1000.0" y="400" width="220" height="6" rx="3" ry="3" fill="#4f7a8a"/><text x="1110.0" y="430" text-anchor="middle" font-size="20" font-weight="700" fill="#1f2933">exporter</text><text x="1110.0" y="450" text-anchor="middle" font-size="16" font-style="italic" fill="#52606d">delivers to external sink</text><text x="1110.0" y="474" text-anchor="middle" font-size="16" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">ExporterWrapper</text><rect x="248" y="576" width="1104" height="36" rx="6" ry="6" fill="#f4f6f8" stroke="#9aa5b1" stroke-width="1"/><text x="262" y="599.0" font-size="18" font-family="'JetBrains Mono', Menlo, Consolas, monospace" font-weight="600" fill="#1f2933">TopicSet&lt;PData&gt;</text><text x="1338" y="599.0" text-anchor="end" font-size="16" font-style="italic" fill="#52606d">per-core view of the controller-owned TopicBroker (only cross-core path)</text><line x1="600.0" y1="447.0" x2="690.0" y2="447.0" stroke="#4f7a8a" stroke-width="3.0" stroke-linecap="round" marker-end="url(#ah-pdata)"/><line x1="910.0" y1="447.0" x2="1000.0" y2="447.0" stroke="#4f7a8a" stroke-width="3.0" stroke-linecap="round" marker-end="url(#ah-pdata)"/><line x1="1212.0" y1="538" x2="388.0" y2="538" stroke="#52606d" stroke-width="1.4" marker-end="url(#ah-ctrl)"/><text x="800.0" y="532" text-anchor="middle" font-size="16" font-style="italic" fill="#52606d">ack / nack rail (control plane)</text><line x1="428.0" y1="340" x2="474.0" y2="400" stroke="#52606d" stroke-width="1.4" marker-end="url(#ah-ctrl)"/><line x1="428.0" y1="340" x2="784.0" y2="400" stroke="#52606d" stroke-width="1.4" marker-end="url(#ah-ctrl)"/><line x1="428.0" y1="340" x2="1094.0" y2="400" stroke="#52606d" stroke-width="1.4" marker-end="url(#ah-ctrl)"/><text x="434.0" y="358" font-size="16" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">NodeControlMsg</text><line x1="506.0" y1="400" x2="1172.0" y2="340" stroke="#52606d" stroke-width="1.4" marker-end="url(#ah-ctrl)"/><line x1="816.0" y1="400" x2="1172.0" y2="340" stroke="#52606d" stroke-width="1.4" marker-end="url(#ah-ctrl)"/><line x1="1126.0" y1="400" x2="1172.0" y2="340" stroke="#52606d" stroke-width="1.4" marker-end="url(#ah-ctrl)"/><text x="1166.0" y="358" text-anchor="end" font-size="16" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">PipelineCompletionMsg</text><line x1="490.0" y1="510" x2="490.0" y2="576" stroke="#9aa5b1" stroke-width="1" stroke-dasharray="2,3"/><line x1="800.0" y1="510" x2="800.0" y2="576" stroke="#9aa5b1" stroke-width="1" stroke-dasharray="2,3"/><line x1="1110.0" y1="510" x2="1110.0" y2="576" stroke="#9aa5b1" stroke-width="1" stroke-dasharray="2,3"/><line x1="40" y1="220" x2="220" y2="220" stroke="#52606d" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#ah-ctrl)"/><text x="214" y="216" text-anchor="end" font-size="12" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">RuntimeCtrlMsgReceiver</text><line x1="220" y1="248" x2="40" y2="248" stroke="#52606d" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#ah-ctrl)"/><text x="214" y="244" text-anchor="end" font-size="12" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">PipelineCompletionMsgSender</text><line x1="220" y1="276" x2="40" y2="276" stroke="#52606d" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#ah-ctrl)"/><text x="214" y="272" text-anchor="end" font-size="12" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">note_instance_exit (Weak)</text><line x1="1560" y1="220" x2="1380" y2="220" stroke="#52606d" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#ah-ctrl)"/><text x="1386" y="216" font-size="12" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">memory_pressure (watch) rx</text><line x1="1380" y1="246" x2="1560" y2="246" stroke="#52606d" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#ah-ctrl)"/><line x1="1560" y1="250" x2="1380" y2="250" stroke="#52606d" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#ah-ctrl)"/><text x="1386" y="244" font-size="12" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">topics (TopicBroker)</text><text x="214" y="314" text-anchor="end" font-size="12" font-style="italic" fill="#52606d">← to controller process</text><text x="1386" y="286" font-size="12" font-style="italic" fill="#52606d">→ controller-owned shared state</text><rect x="80" y="658" width="1440" height="172" rx="10" ry="10" fill="#f4f6f8" stroke="#9aa5b1" stroke-width="1"/><text x="104" y="700" font-size="18" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">1.</text><text x="130" y="700" font-size="18" fill="#1f2933">Everything inside the blue box runs on a single OS thread driven by RuntimePipeline::run_forever.</text><text x="104" y="730" font-size="18" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">2.</text><text x="130" y="730" font-size="18" fill="#1f2933">Node tasks use LocalSet::spawn_local because every wrapper is !Send (hence current_thread, not multi_thread).</text><text x="104" y="760" font-size="18" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">3.</text><text x="130" y="760" font-size="18" fill="#1f2933">RuntimeCtrlMsgManager owns the per-node local timer wheel that backs requeue_later / Control::DelayedData.</text><text x="104" y="790" font-size="18" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">4.</text><text x="130" y="790" font-size="18" fill="#1f2933">PipelineCompletionMsgDispatcher is the universal Ack/Nack router; per-node slides hide it because it is uniform.</text><text x="104" y="820" font-size="18" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">5.</text><text x="130" y="820" font-size="18" fill="#1f2933">The thread reaches the outside world only through the labelled stubs and the shared TopicBroker.</text></svg>