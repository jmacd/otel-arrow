<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="850" viewBox="0 0 1600 850" font-family="Inter, 'Helvetica Neue', Arial, sans-serif"><rect width="1600" height="850" fill="#ffffff"/><defs><marker id="ah-pdata" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse" markerUnits="userSpaceOnUse"><path d="M0,0 L10,5 L0,10 z" fill="context-stroke"/></marker><marker id="ah-ctrl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse" markerUnits="userSpaceOnUse"><path d="M0,1 L10,5 L0,9" fill="none" stroke="context-stroke" stroke-width="1.4"/></marker></defs><rect x="80" y="80" width="1440" height="2" fill="#52606d"/><text x="80" y="62" font-size="34" font-weight="600" fill="#1f2933">transform_processor</text><text x="1520" y="62" font-size="20" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d" text-anchor="end">urn:otel:processor:transform</text><text x="80" y="120" font-size="24" font-style="italic" fill="#52606d"><tspan x="80" dy="0">Runs a query-engine pipeline over each OTAP batch; the</tspan><tspan x="80" dy="28">query is written in one of several supported expression</tspan><tspan x="80" dy="28">languages.</tspan></text><text x="1320" y="104" text-anchor="end" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">kql_query</text><text x="1520" y="104" text-anchor="end" font-size="17" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">String</text><text x="1320" y="126" text-anchor="end" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">opl_query</text><text x="1520" y="126" text-anchor="end" font-size="17" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">String</text><text x="1320" y="148" text-anchor="end" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">inbound_request_limit</text><text x="1520" y="148" text-anchor="end" font-size="17" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">NonZeroUsize</text><text x="1320" y="170" text-anchor="end" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">outbound_request_limit</text><text x="1520" y="170" text-anchor="end" font-size="17" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">NonZeroUsize</text><text x="1320" y="192" text-anchor="end" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">skip_sanitize_result</text><text x="1520" y="192" text-anchor="end" font-size="17" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">bool</text><text x="1320" y="214" text-anchor="end" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">filter_attribute_keys_case_sensitive</text><text x="1520" y="214" text-anchor="end" font-size="17" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">bool</text><text x="880.0" y="310" text-anchor="middle" font-size="26" font-weight="700" fill="#1f2933">transform_processor</text><g><rect x="520.0" y="328" width="720" height="320" rx="10" ry="10" fill="white" stroke="#52606d" stroke-width="1.6"/><rect x="520.0" y="328" width="720" height="6" rx="3" ry="3" fill="#52606d"/><text x="880.0" y="356" text-anchor="middle" font-size="26" font-weight="600" fill="#1f2933"></text></g><text x="540.0" y="366" font-size="20" fill="#1f2933">Parsed query pipeline</text><text x="540.0" y="392" font-size="20" fill="#1f2933">Query-engine execution state</text><text x="540.0" y="418" font-size="20" fill="#1f2933">Inbound ack/nack slots</text><text x="540.0" y="444" font-size="20" fill="#1f2933">Outbound ack/nack slots</text><text x="540.0" y="470" font-size="20" fill="#1f2933">Split-off batch buffer</text><text x="890.0" y="366" font-size="20" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">connected_ports</text><text x="890.0" y="392" font-size="20" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">notify_ack</text><text x="890.0" y="418" font-size="20" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">notify_nack</text><text x="890.0" y="444" font-size="20" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">send_message</text><text x="890.0" y="470" font-size="20" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">send_message_to</text><text x="890.0" y="496" font-size="20" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">subscribe_to</text><line x1="80" y1="434.66666666666663" x2="520.0" y2="434.66666666666663" stroke="#52606d" stroke-width="3.0" stroke-linecap="round" marker-end="url(#ah-pdata)"/><line x1="1240.0" y1="423.66666666666663" x2="1520" y2="423.66666666666663" stroke="#52606d" stroke-width="3.0" stroke-linecap="round" marker-end="url(#ah-pdata)"/><text x="1246.0" y="437.66666666666663" text-anchor="start" font-size="10" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">main</text><line x1="1240.0" y1="445.66666666666663" x2="1520" y2="445.66666666666663" stroke="#52606d" stroke-width="3.0" stroke-linecap="round" marker-end="url(#ah-pdata)"/><text x="1246.0" y="459.66666666666663" text-anchor="start" font-size="10" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">errors</text><g><rect x="1250.0" y="389.66666666666663" width="76" height="28" rx="5" ry="5" fill="#4f7a8a" stroke="#4f7a8a"/><text x="1288.0" y="408.66666666666663" text-anchor="middle" font-size="16" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="white">OTAP</text></g><line x1="1520" y1="562.6666666666666" x2="1240.0" y2="562.6666666666666" stroke="#52606d" stroke-width="1.4" marker-end="url(#ah-ctrl)"/><line x1="520.0" y1="562.6666666666666" x2="80" y2="562.6666666666666" stroke="#52606d" stroke-width="1.4" marker-end="url(#ah-ctrl)"/><text x="80" y="426.66666666666663" text-anchor="start" font-size="14" fill="#1f2933">PData</text><text x="80" y="554.6666666666666" text-anchor="start" font-size="14" fill="#1f2933">Ack/Nack</text><text x="1520" y="415.66666666666663" text-anchor="end" font-size="14" fill="#1f2933">PData</text><text x="1520" y="554.6666666666666" text-anchor="end" font-size="14" fill="#1f2933">Ack/Nack</text><rect x="1300.0" y="766.0" width="220" height="46" rx="3" ry="3" fill="white" stroke="#c9b458" stroke-width="1" stroke-dasharray="2,2"/><text x="1314.0" y="795.0" font-size="16" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">outbound</text><text x="1506.0" y="795.0" text-anchor="end" font-size="16" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">SlotKey</text><line x1="1410.0" y1="766.0" x2="1410.0" y2="427.66666666666663" stroke="#c9b458" stroke-width="1" stroke-dasharray="2,2"/><line x1="941.0" y1="682" x2="941.0" y2="656" stroke="#52606d" stroke-width="1.4" marker-end="url(#ah-ctrl)"/><line x1="963.0" y1="656" x2="963.0" y2="682" stroke="#52606d" stroke-width="1.4" marker-end="url(#ah-ctrl)"/><text x="930.0" y="700" font-size="14" font-style="italic" fill="#52606d">control</text><text x="930.0" y="722" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">CollectTelemetry</text><line x1="1171.0" y1="682" x2="1171.0" y2="656" stroke="#52606d" stroke-width="1.4" marker-end="url(#ah-ctrl)"/><line x1="1193.0" y1="656" x2="1193.0" y2="682" stroke="#52606d" stroke-width="1.4" marker-end="url(#ah-ctrl)"/><text x="1160.0" y="700" font-size="14" font-style="italic" fill="#52606d">ack/nack</text><text x="1160.0" y="722" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">Receive</text><text x="1160.0" y="744" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">Send</text><rect x="80" y="680" width="700" height="140" rx="10" ry="10" fill="#f4f6f8" stroke="#9aa5b1" stroke-width="1"/><text x="104" y="720" font-size="16" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">1.</text><text x="130" y="720" font-size="16" fill="#1f2933">Exactly one of kql_query or opl_query must be set; the leading source token</text><text x="130" y="740" font-size="16" fill="#1f2933">(logs / traces / metrics / signal) selects which signal type the pipeline</text><text x="130" y="760" font-size="16" fill="#1f2933">applies to.</text><text x="104" y="788" font-size="16" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">2.</text><text x="130" y="788" font-size="16" fill="#1f2933">Inputs whose signal type does not match the query are passed through</text><text x="130" y="808" font-size="16" fill="#1f2933">unchanged.</text><text x="104" y="836" font-size="16" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">3.</text><text x="130" y="836" font-size="16" fill="#1f2933">OTLP inputs are converted to OTAP records before the query runs; outputs are</text><text x="130" y="856" font-size="16" fill="#1f2933">emitted as OTAP only.</text><text x="104" y="884" font-size="16" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">4.</text><text x="130" y="884" font-size="16" fill="#1f2933">A route_to operator splits the batch onto a named output port; an inbound</text><text x="130" y="904" font-size="16" fill="#1f2933">request is not Ack'd until every split-off outbound batch is Ack'd.</text><text x="104" y="932" font-size="16" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">5.</text><text x="130" y="932" font-size="16" fill="#1f2933">skip_sanitize_result keeps removed/redacted bytes in the underlying Arrow</text><text x="130" y="952" font-size="16" fill="#1f2933">buffers — leave it false for security-driven transforms.</text></svg>