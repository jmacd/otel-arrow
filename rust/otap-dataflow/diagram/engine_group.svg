<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="850" viewBox="0 0 1600 850" font-family="Inter, 'Helvetica Neue', Arial, sans-serif"><rect width="1600" height="850" fill="#ffffff"/><defs><marker id="ah-pdata" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse" markerUnits="userSpaceOnUse"><path d="M0,0 L10,5 L0,10 z" fill="context-stroke"/></marker><marker id="ah-ctrl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse" markerUnits="userSpaceOnUse"><path d="M0,1 L10,5 L0,9" fill="none" stroke="context-stroke" stroke-width="1.4"/></marker></defs><rect x="80" y="60" width="1440" height="2" fill="#4f7a8a"/><text x="80" y="42" font-size="34" font-weight="600" fill="#1f2933">Pipeline group</text><text x="1520" y="42" font-size="20" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d" text-anchor="end">ControllerRuntime + N × RuntimePipeline</text><text x="80" y="90" font-size="20" font-style="italic" fill="#52606d">One controller process supervises one OS thread per assigned core; cores share only topics and memory-pressure signals.</text><g><rect x="80" y="130" width="580" height="440" rx="14" ry="14" fill="white" stroke="#52606d" stroke-width="1.6"/><rect x="80" y="130" width="580" height="6" rx="3" ry="3" fill="#52606d"/><text x="102" y="164" font-size="26" font-weight="700" fill="#1f2933">Controller process</text><text x="102" y="186" font-size="18" font-style="italic" fill="#52606d">single process; spawns and supervises every other thread</text><text x="644" y="158" text-anchor="end" font-size="18" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">ControllerRuntime&lt;PData&gt;</text></g><text x="102" y="210" font-size="18" font-weight="700" fill="#1f2933">thread-local accessory tasks</text><text x="102" y="226" font-size="14" font-style="italic" fill="#52606d">each tile = own OS thread + own tokio current_thread runtime</text><rect x="102" y="238" width="536" height="32" rx="6" ry="6" fill="#f4f6f8" stroke="#9aa5b1" stroke-width="1"/><text x="114" y="259.0" font-size="18" font-family="'JetBrains Mono', Menlo, Consolas, monospace" font-weight="600" fill="#1f2933">process-memory-limiter</text><text x="626" y="259.0" text-anchor="end" font-size="16" font-style="italic" fill="#52606d">watches RSS</text><rect x="102" y="278" width="536" height="32" rx="6" ry="6" fill="#f4f6f8" stroke="#9aa5b1" stroke-width="1"/><text x="114" y="299.0" font-size="18" font-family="'JetBrains Mono', Menlo, Consolas, monospace" font-weight="600" fill="#1f2933">metrics-aggregator</text><text x="626" y="299.0" text-anchor="end" font-size="16" font-style="italic" fill="#52606d">merges per-core snapshots</text><rect x="102" y="318" width="536" height="32" rx="6" ry="6" fill="#f4f6f8" stroke="#9aa5b1" stroke-width="1"/><text x="114" y="339.0" font-size="18" font-family="'JetBrains Mono', Menlo, Consolas, monospace" font-weight="600" fill="#1f2933">metrics-dispatcher</text><text x="626" y="339.0" text-anchor="end" font-size="16" font-style="italic" fill="#52606d">fans aggregates to readers</text><rect x="102" y="358" width="536" height="32" rx="6" ry="6" fill="#f4f6f8" stroke="#9aa5b1" stroke-width="1"/><text x="114" y="379.0" font-size="18" font-family="'JetBrains Mono', Menlo, Consolas, monospace" font-weight="600" fill="#1f2933">observed-state-store</text><text x="626" y="379.0" text-anchor="end" font-size="16" font-style="italic" fill="#52606d">rolls up lifecycle state</text><rect x="102" y="398" width="536" height="32" rx="6" ry="6" fill="#f4f6f8" stroke="#9aa5b1" stroke-width="1"/><text x="114" y="419.0" font-size="18" font-family="'JetBrains Mono', Menlo, Consolas, monospace" font-weight="600" fill="#1f2933">engine-metrics</text><text x="626" y="419.0" text-anchor="end" font-size="16" font-style="italic" fill="#52606d">control-plane metrics ingest</text><text x="102" y="452" font-size="18" font-weight="700" fill="#1f2933">shared resources</text><rect x="102" y="466" width="536" height="32" rx="6" ry="6" fill="#f4f6f8" stroke="#9aa5b1" stroke-width="1"/><text x="114" y="487.0" font-size="18" font-family="'JetBrains Mono', Menlo, Consolas, monospace" font-weight="600" fill="#1f2933">DeclaredTopics(TopicBroker)</text><text x="626" y="487.0" text-anchor="end" font-size="16" font-style="italic" fill="#52606d">only cross-core path</text><rect x="102" y="506" width="536" height="32" rx="6" ry="6" fill="#f4f6f8" stroke="#9aa5b1" stroke-width="1"/><text x="114" y="527.0" font-size="18" font-family="'JetBrains Mono', Menlo, Consolas, monospace" font-weight="600" fill="#1f2933">memory_pressure tx (watch)</text><text x="626" y="527.0" text-anchor="end" font-size="16" font-style="italic" fill="#52606d">broadcast to every core</text><g><rect x="80" y="590" width="580" height="64" rx="14" ry="14" fill="white" stroke="#52606d" stroke-width="1.6"/><rect x="80" y="590" width="580" height="6" rx="3" ry="3" fill="#c9b458"/><text x="102" y="624" font-size="26" font-weight="700" fill="#1f2933">http-admin</text><text x="102" y="646" font-size="18" font-style="italic" fill="#52606d">own OS thread + own tokio current_thread runtime</text><text x="644" y="618" text-anchor="end" font-size="18" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">otap_df_admin::run</text></g><line x1="399.0" y1="570" x2="399.0" y2="590" stroke="#52606d" stroke-width="1.4" marker-end="url(#ah-ctrl)"/><text x="407.0" y="584.0" font-size="16" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">Arc&lt;dyn ControlPlane&gt;</text><rect x="940" y="98" width="580" height="24" rx="4" ry="4" fill="#4f7a8a" fill-opacity="0.10" stroke="#4f7a8a" stroke-width="1"/><text x="1230.0" y="115.0" text-anchor="middle" font-size="18" font-weight="700" fill="#4f7a8a">one OS thread → one tokio current_thread runtime → one core</text><rect x="940" y="130" width="580" height="110" rx="10" ry="10" fill="white" stroke="#52606d" stroke-width="1.6"/><rect x="940" y="130" width="580" height="6" rx="3" ry="3" fill="#4f7a8a"/><text x="962" y="170" font-size="26" font-weight="700" fill="#1f2933">Core 0</text><text x="962" y="224" font-size="16" font-style="italic" fill="#52606d">tokio current_thread · LocalSet · !Send node tasks</text><text x="1504" y="158" text-anchor="end" font-size="18" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">RuntimePipeline&lt;PData&gt;</text><text x="1504" y="190" text-anchor="end" font-size="18" font-weight="700" fill="#4f7a8a">1 OS thread</text><text x="1504" y="210" text-anchor="end" font-size="16" font-style="italic" fill="#52606d">pinned to core via affinity</text><rect x="940" y="258" width="580" height="110" rx="10" ry="10" fill="white" stroke="#52606d" stroke-width="1.6"/><rect x="940" y="258" width="580" height="6" rx="3" ry="3" fill="#4f7a8a"/><text x="962" y="298" font-size="26" font-weight="700" fill="#1f2933">Core 1</text><text x="962" y="352" font-size="16" font-style="italic" fill="#52606d">tokio current_thread · LocalSet · !Send node tasks</text><text x="1504" y="286" text-anchor="end" font-size="18" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">RuntimePipeline&lt;PData&gt;</text><text x="1504" y="318" text-anchor="end" font-size="18" font-weight="700" fill="#4f7a8a">1 OS thread</text><text x="1504" y="338" text-anchor="end" font-size="16" font-style="italic" fill="#52606d">pinned to core via affinity</text><text x="1230.0" y="412.0" text-anchor="middle" font-size="26" fill="#52606d">⋮</text><rect x="940" y="422" width="580" height="110" rx="10" ry="10" fill="white" stroke="#52606d" stroke-width="1.6"/><rect x="940" y="422" width="580" height="6" rx="3" ry="3" fill="#4f7a8a"/><text x="962" y="462" font-size="26" font-weight="700" fill="#1f2933">Core N</text><text x="962" y="516" font-size="16" font-style="italic" fill="#52606d">tokio current_thread · LocalSet · !Send node tasks</text><text x="1504" y="450" text-anchor="end" font-size="18" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">RuntimePipeline&lt;PData&gt;</text><text x="1504" y="482" text-anchor="end" font-size="18" font-weight="700" fill="#4f7a8a">1 OS thread</text><text x="1504" y="502" text-anchor="end" font-size="16" font-style="italic" fill="#52606d">pinned to core via affinity</text><line x1="660" y1="133.0" x2="940" y2="133.0" stroke="#52606d" stroke-width="1.4" marker-end="url(#ah-ctrl)"/><text x="800.0" y="127.0" text-anchor="middle" font-size="16" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">RuntimeCtrlMsgSender</text><line x1="660" y1="159.0" x2="940" y2="159.0" stroke="#52606d" stroke-width="1.4" marker-start="url(#ah-ctrl)"/><text x="800.0" y="153.0" text-anchor="middle" font-size="16" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">PipelineCompletionMsgSender</text><line x1="660" y1="185.0" x2="940" y2="185.0" stroke="#52606d" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#ah-ctrl)"/><text x="800.0" y="179.0" text-anchor="middle" font-size="16" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">memory_pressure (watch)</text><line x1="660" y1="209.0" x2="940" y2="209.0" stroke="#52606d" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#ah-ctrl)"/><line x1="660" y1="213.0" x2="940" y2="213.0" stroke="#52606d" stroke-width="1.4" stroke-dasharray="4,3" marker-start="url(#ah-ctrl)"/><text x="800.0" y="203.0" text-anchor="middle" font-size="16" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">topics (TopicBroker)</text><line x1="660" y1="237.0" x2="940" y2="237.0" stroke="#52606d" stroke-width="1.4" stroke-dasharray="4,3" marker-start="url(#ah-ctrl)"/><text x="800.0" y="231.0" text-anchor="middle" font-size="16" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">note_instance_exit (Weak)</text><line x1="880" y1="261.0" x2="940" y2="261.0" stroke="#52606d" stroke-width="1.4" marker-end="url(#ah-ctrl)"/><line x1="880" y1="287.0" x2="940" y2="287.0" stroke="#52606d" stroke-width="1.4" marker-start="url(#ah-ctrl)"/><line x1="880" y1="313.0" x2="940" y2="313.0" stroke="#52606d" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#ah-ctrl)"/><line x1="880" y1="339.0" x2="940" y2="339.0" stroke="#52606d" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#ah-ctrl)"/><line x1="880" y1="365.0" x2="940" y2="365.0" stroke="#52606d" stroke-width="1.4" stroke-dasharray="4,3" marker-start="url(#ah-ctrl)"/><line x1="880" y1="425.0" x2="940" y2="425.0" stroke="#52606d" stroke-width="1.4" marker-end="url(#ah-ctrl)"/><line x1="880" y1="451.0" x2="940" y2="451.0" stroke="#52606d" stroke-width="1.4" marker-start="url(#ah-ctrl)"/><line x1="880" y1="477.0" x2="940" y2="477.0" stroke="#52606d" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#ah-ctrl)"/><line x1="880" y1="503.0" x2="940" y2="503.0" stroke="#52606d" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#ah-ctrl)"/><line x1="880" y1="529.0" x2="940" y2="529.0" stroke="#52606d" stroke-width="1.4" stroke-dasharray="4,3" marker-start="url(#ah-ctrl)"/><text x="800.0" y="105.0" text-anchor="middle" font-size="16" font-style="italic" fill="#52606d">every core has the same set of channels</text><rect x="80" y="672" width="1440" height="158" rx="10" ry="10" fill="#f4f6f8" stroke="#9aa5b1" stroke-width="1"/><text x="104" y="714" font-size="18" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">1.</text><text x="130" y="714" font-size="18" fill="#1f2933">One OS thread per assigned core (std::thread::spawn), pinned via OS affinity at startup.</text><text x="104" y="744" font-size="18" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">2.</text><text x="130" y="744" font-size="18" fill="#1f2933">Each per-core thread runs its own tokio current_thread runtime + LocalSet (node tasks are !Send).</text><text x="104" y="774" font-size="18" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">3.</text><text x="130" y="774" font-size="18" fill="#1f2933">Cores are otherwise independent; cross-core data flows only through the shared TopicBroker.</text><text x="104" y="804" font-size="18" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">4.</text><text x="130" y="804" font-size="18" fill="#1f2933">Two tokio mpsc channels per core: RuntimeCtrlMsgSender down, PipelineCompletionMsgSender up.</text><text x="104" y="834" font-size="18" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">5.</text><text x="130" y="834" font-size="18" fill="#1f2933">memory_pressure is one tokio::sync::watch broadcast; admin reaches the runtime via Arc&lt;dyn ControlPlane&gt;.</text></svg>