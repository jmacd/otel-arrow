<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="850" viewBox="0 0 1600 850" font-family="Inter, 'Helvetica Neue', Arial, sans-serif"><rect width="1600" height="850" fill="#ffffff"/><defs><marker id="ah-pdata" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse" markerUnits="userSpaceOnUse"><path d="M0,0 L10,5 L0,10 z" fill="context-stroke"/></marker><marker id="ah-ctrl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse" markerUnits="userSpaceOnUse"><path d="M0,1 L10,5 L0,9" fill="none" stroke="context-stroke" stroke-width="1.4"/></marker></defs><rect x="80" y="80" width="1440" height="2" fill="#4f7a8a"/><text x="80" y="62" font-size="34" font-weight="600" fill="#1f2933">attributes_processor</text><text x="1520" y="62" font-size="20" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d" text-anchor="end">urn:otel:processor:attribute</text><text x="80" y="120" font-size="24" font-style="italic" fill="#52606d"><tspan x="80" dy="0">Applies configured attribute edits to selected OTAP</tspan><tspan x="80" dy="28">attribute domains.</tspan></text><text x="1320" y="104" text-anchor="end" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">actions</text><text x="1520" y="104" text-anchor="end" font-size="17" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">Vec&lt;Action&gt;</text><text x="1320" y="126" text-anchor="end" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">apply_to</text><text x="1520" y="126" text-anchor="end" font-size="17" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">Option&lt;Vec&lt;String&gt;&gt;</text><text x="800.0" y="260" text-anchor="middle" font-size="26" font-weight="700" fill="#1f2933">attributes_processor</text><g><rect x="440.0" y="278" width="720" height="320" rx="10" ry="10" fill="white" stroke="#52606d" stroke-width="1.6"/><rect x="440.0" y="278" width="720" height="6" rx="3" ry="3" fill="#4f7a8a"/><text x="800.0" y="306" text-anchor="middle" font-size="26" font-weight="600" fill="#1f2933"></text></g><text x="810.0" y="316" font-size="20" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">send_message</text><text x="810.0" y="342" font-size="20" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">timed</text><line x1="80" y1="384.66666666666663" x2="440.0" y2="384.66666666666663" stroke="#4f7a8a" stroke-width="3.0" stroke-linecap="round" marker-end="url(#ah-pdata)"/><line x1="1160.0" y1="384.66666666666663" x2="1520" y2="384.66666666666663" stroke="#4f7a8a" stroke-width="3.0" stroke-linecap="round" marker-end="url(#ah-pdata)"/><g><rect x="1170.0" y="350.66666666666663" width="76" height="28" rx="5" ry="5" fill="#4f7a8a" stroke="#4f7a8a"/><text x="1208.0" y="369.66666666666663" text-anchor="middle" font-size="16" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="white">OTAP</text></g><line x1="1520" y1="512.6666666666666" x2="1160.0" y2="512.6666666666666" stroke="#52606d" stroke-width="1.4" marker-end="url(#ah-ctrl)"/><line x1="440.0" y1="512.6666666666666" x2="80" y2="512.6666666666666" stroke="#52606d" stroke-width="1.4" marker-end="url(#ah-ctrl)"/><text x="80" y="376.66666666666663" text-anchor="start" font-size="14" fill="#1f2933">PData</text><text x="80" y="504.66666666666663" text-anchor="start" font-size="14" fill="#1f2933">Ack/Nack</text><line x1="451.0" y1="632" x2="451.0" y2="606" stroke="#52606d" stroke-width="1.4" marker-end="url(#ah-ctrl)"/><line x1="473.0" y1="606" x2="473.0" y2="632" stroke="#52606d" stroke-width="1.4" marker-end="url(#ah-ctrl)"/><text x="440.0" y="650" font-size="14" font-style="italic" fill="#52606d">control</text><text x="440.0" y="672" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">CollectTelemetry</text><line x1="691.0" y1="632" x2="691.0" y2="606" stroke="#52606d" stroke-width="1.4" marker-end="url(#ah-ctrl)"/><line x1="713.0" y1="606" x2="713.0" y2="632" stroke="#52606d" stroke-width="1.4" marker-end="url(#ah-ctrl)"/><text x="680.0" y="650" font-size="14" font-style="italic" fill="#52606d">ack/nack</text><text x="680.0" y="672" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">Receive</text><text x="680.0" y="694" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">Send</text><rect x="820" y="640" width="700" height="180" rx="10" ry="10" fill="#f4f6f8" stroke="#9aa5b1" stroke-width="1"/><text x="844" y="680" font-size="16" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">1.</text><text x="870" y="680" font-size="16" fill="#1f2933">Supported actions are rename, delete, insert, and upsert; unsupported actions</text><text x="870" y="700" font-size="16" fill="#1f2933">deserialize but are ignored.</text><text x="844" y="728" font-size="16" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">2.</text><text x="870" y="728" font-size="16" fill="#1f2933">apply_to selects signal, resource, and/or scope attribute domains; omitted</text><text x="870" y="748" font-size="16" fill="#1f2933">apply_to defaults to signal attributes.</text><text x="844" y="776" font-size="16" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">3.</text><text x="870" y="776" font-size="16" fill="#1f2933">OTLP inputs are converted to OTAP records before transforms run, so non-noop</text><text x="870" y="796" font-size="16" fill="#1f2933">outputs are OTAP.</text><text x="844" y="824" font-size="16" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">4.</text><text x="870" y="824" font-size="16" fill="#1f2933">A no-action configuration forwards the original pdata unchanged as a fast</text><text x="870" y="844" font-size="16" fill="#1f2933">path.</text></svg>