<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="850" viewBox="0 0 1600 850" font-family="Inter, 'Helvetica Neue', Arial, sans-serif"><rect width="1600" height="850" fill="#ffffff"/><defs><marker id="ah-pdata" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse" markerUnits="userSpaceOnUse"><path d="M0,0 L10,5 L0,10 z" fill="context-stroke"/></marker><marker id="ah-ctrl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse" markerUnits="userSpaceOnUse"><path d="M0,1 L10,5 L0,9" fill="none" stroke="context-stroke" stroke-width="1.4"/></marker></defs><rect x="80" y="80" width="1440" height="2" fill="#52606d"/><text x="80" y="62" font-size="34" font-weight="600" fill="#1f2933">otap_receiver</text><text x="1520" y="62" font-size="20" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d" text-anchor="end">urn:otel:receiver:otap</text><text x="80" y="120" font-size="24" font-style="italic" fill="#52606d"><tspan x="80" dy="0">Ingests OTel-Arrow gRPC streams (logs / metrics / traces)</tspan><tspan x="80" dy="28">and emits decoded OTAP record batches.</tspan></text><text x="1234" y="104" text-anchor="end" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">listening_addr</text><text x="1520" y="104" text-anchor="end" font-size="17" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">SocketAddr</text><text x="1234" y="126" text-anchor="end" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">compression_method</text><text x="1520" y="126" text-anchor="end" font-size="17" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">Option&lt;CompressionMethod&gt;</text><text x="1234" y="148" text-anchor="end" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">response_stream_channel_size</text><text x="1520" y="148" text-anchor="end" font-size="17" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">usize</text><text x="1234" y="170" text-anchor="end" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">max_concurrent_requests</text><text x="1520" y="170" text-anchor="end" font-size="17" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">usize</text><text x="1234" y="192" text-anchor="end" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">max_concurrent_requests_per_stream</text><text x="1520" y="192" text-anchor="end" font-size="17" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">NonZeroUsize</text><text x="1234" y="214" text-anchor="end" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">wait_for_result</text><text x="1520" y="214" text-anchor="end" font-size="17" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">bool</text><text x="1234" y="236" text-anchor="end" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">timeout</text><text x="1520" y="236" text-anchor="end" font-size="17" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">Option&lt;Duration&gt;</text><text x="1234" y="258" text-anchor="end" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">tls</text><text x="1520" y="258" text-anchor="end" font-size="17" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">Option&lt;TlsServerConfig&gt;</text><text x="880.0" y="310" text-anchor="middle" font-size="26" font-weight="700" fill="#1f2933">otap_receiver</text><rect x="990.95" y="288.0" width="168" height="28" rx="6" ry="6" fill="#b15a4f" stroke="none"/><text x="1074.95" y="307" text-anchor="middle" font-size="14" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#ffffff">SHARED · Send</text><g><rect x="520.0" y="328" width="720" height="320" rx="10" ry="10" fill="white" stroke="#52606d" stroke-width="1.6"/><rect x="520.0" y="328" width="720" height="6" rx="3" ry="3" fill="#52606d"/><text x="880.0" y="356" text-anchor="middle" font-size="26" font-weight="600" fill="#1f2933"></text></g><text x="540.0" y="366" font-size="20" fill="#1f2933">Ack subscription registry</text><text x="540.0" y="392" font-size="20" fill="#1f2933">Shared admission state</text><text x="540.0" y="418" font-size="20" fill="#1f2933">Memory-pressure rejection counters</text><text x="890.0" y="366" font-size="20" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">notify_receiver_drained</text><text x="890.0" y="392" font-size="20" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">send_message</text><text x="890.0" y="418" font-size="20" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">start_periodic_telemetry</text><text x="890.0" y="444" font-size="20" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">subscribe_to</text><text x="890.0" y="470" font-size="20" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">tcp_listener</text><line x1="80" y1="434.66666666666663" x2="520.0" y2="434.66666666666663" stroke="#52606d" stroke-width="3.0" stroke-linecap="round" marker-end="url(#ah-pdata)"/><line x1="1240.0" y1="434.66666666666663" x2="1520" y2="434.66666666666663" stroke="#52606d" stroke-width="3.0" stroke-linecap="round" marker-end="url(#ah-pdata)"/><g><rect x="1250.0" y="400.66666666666663" width="76" height="28" rx="5" ry="5" fill="#4f7a8a" stroke="#4f7a8a"/><text x="1288.0" y="419.66666666666663" text-anchor="middle" font-size="16" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="white">OTAP</text></g><line x1="1520" y1="562.6666666666666" x2="1240.0" y2="562.6666666666666" stroke="#52606d" stroke-width="1.4" marker-end="url(#ah-ctrl)"/><line x1="520.0" y1="562.6666666666666" x2="80" y2="562.6666666666666" stroke="#52606d" stroke-width="1.4" marker-end="url(#ah-ctrl)"/><text x="80" y="426.66666666666663" text-anchor="start" font-size="14" fill="#1f2933">gRPC</text><text x="80" y="554.6666666666666" text-anchor="start" font-size="14" fill="#1f2933">gRPC status</text><text x="1520" y="426.66666666666663" text-anchor="end" font-size="14" fill="#1f2933">PData</text><text x="1520" y="554.6666666666666" text-anchor="end" font-size="14" fill="#1f2933">Ack/Nack</text><rect x="1300.0" y="766.0" width="220" height="46" rx="3" ry="3" fill="white" stroke="#c9b458" stroke-width="1" stroke-dasharray="2,2"/><text x="1314.0" y="795.0" font-size="16" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">slot</text><text x="1506.0" y="795.0" text-anchor="end" font-size="16" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">SlotKey</text><line x1="1410.0" y1="766.0" x2="1410.0" y2="438.66666666666663" stroke="#c9b458" stroke-width="1" stroke-dasharray="2,2"/><line x1="941.0" y1="682" x2="941.0" y2="656" stroke="#52606d" stroke-width="1.4" marker-end="url(#ah-ctrl)"/><line x1="963.0" y1="656" x2="963.0" y2="682" stroke="#52606d" stroke-width="1.4" marker-end="url(#ah-ctrl)"/><text x="930.0" y="700" font-size="14" font-style="italic" fill="#52606d">control</text><text x="930.0" y="722" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">CollectTelemetry</text><text x="930.0" y="744" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">DrainIngress</text><text x="930.0" y="766" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">MemoryPressureChanged</text><text x="930.0" y="788" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">Shutdown</text><line x1="1171.0" y1="682" x2="1171.0" y2="656" stroke="#52606d" stroke-width="1.4" marker-end="url(#ah-ctrl)"/><text x="1160.0" y="700" font-size="14" font-style="italic" fill="#52606d">ack/nack</text><text x="1160.0" y="722" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">Receive</text><rect x="80" y="215" width="320" height="170" rx="10" ry="10" fill="#fbf3f2" stroke="#b15a4f" stroke-width="1.2"/><text x="98" y="247" font-size="14" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#b15a4f">Foreign entities (Send refs)</text><text x="98" y="271" font-size="14" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">• Tonic gRPC server</text><text x="110" y="291" font-size="14" fill="#52606d">Arrow services; Send handler clones.</text><text x="98" y="315" font-size="14" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">• ZstdRequestHeaderAdapter</text><text x="110" y="335" font-size="14" fill="#52606d">Decodes zstd request headers.</text><rect x="80" y="680" width="700" height="140" rx="10" ry="10" fill="#f4f6f8" stroke="#9aa5b1" stroke-width="1"/><text x="104" y="720" font-size="16" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">1.</text><text x="130" y="720" font-size="16" fill="#1f2933">OTAP-only protocol: serves the three Arrow service variants (logs / metrics /</text><text x="130" y="740" font-size="16" fill="#1f2933">traces) over a single gRPC endpoint; default port mirrors the OTel-Arrow Go</text><text x="130" y="760" font-size="16" fill="#1f2933">reference (4317 by convention).</text><text x="104" y="788" font-size="16" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">2.</text><text x="130" y="788" font-size="16" fill="#1f2933">Streams are zero-copy where possible; record batches arrive as Arrow IPC</text><text x="130" y="808" font-size="16" fill="#1f2933">frames and are wrapped into OtapPdata without re-encoding.</text><text x="104" y="836" font-size="16" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">3.</text><text x="130" y="836" font-size="16" fill="#1f2933">wait_for_result holds the per-message response on the gRPC stream until the</text><text x="130" y="856" font-size="16" fill="#1f2933">immediate downstream Acks/Nacks; the default is false (matches the Go</text><text x="130" y="876" font-size="16" fill="#1f2933">collector default).</text><text x="104" y="904" font-size="16" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">4.</text><text x="130" y="904" font-size="16" fill="#1f2933">max_concurrent_requests is enforced by a shared semaphore at the Tower</text><text x="130" y="924" font-size="16" fill="#1f2933">poll_ready layer; per-stream concurrency is additionally clamped by</text><text x="130" y="944" font-size="16" fill="#1f2933">max_concurrent_requests_per_stream.</text><text x="104" y="972" font-size="16" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">5.</text><text x="130" y="972" font-size="16" fill="#1f2933">MemoryPressureChanged feeds the shared admission state so ingress sheds load</text><text x="130" y="992" font-size="16" fill="#1f2933">when the process is under pressure; rejected requests are counted in receiver</text><text x="130" y="1012" font-size="16" fill="#1f2933">metrics.</text><text x="104" y="1040" font-size="16" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">6.</text><text x="130" y="1040" font-size="16" fill="#1f2933">DrainIngress cancels the gRPC listener and lets in-flight wait_for_result</text><text x="130" y="1060" font-size="16" fill="#1f2933">streams settle before notify_receiver_drained.</text><text x="104" y="1088" font-size="16" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">7.</text><text x="130" y="1088" font-size="16" fill="#1f2933">TLS / mTLS are configured via the optional tls block; handshake_timeout is</text><text x="130" y="1108" font-size="16" fill="#1f2933">honored on a per-connection basis.</text></svg>