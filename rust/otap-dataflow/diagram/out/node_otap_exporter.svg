<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="850" viewBox="0 0 1600 850" font-family="Inter, 'Helvetica Neue', Arial, sans-serif"><rect width="1600" height="850" fill="#ffffff"/><defs><marker id="ah-pdata" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse" markerUnits="userSpaceOnUse"><path d="M0,0 L10,5 L0,10 z" fill="context-stroke"/></marker><marker id="ah-ctrl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse" markerUnits="userSpaceOnUse"><path d="M0,1 L10,5 L0,9" fill="none" stroke="context-stroke" stroke-width="1.4"/></marker></defs><rect x="80" y="80" width="1440" height="2" fill="#52606d"/><text x="80" y="62" font-size="34" font-weight="600" fill="#1f2933">otap_exporter</text><text x="1520" y="62" font-size="20" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d" text-anchor="end">urn:otel:exporter:otap</text><text x="80" y="120" font-size="24" font-style="italic" fill="#52606d"><tspan x="80" dy="0">Streams OTAP record batches over per-signal Arrow gRPC</tspan><tspan x="80" dy="28">streams (logs / metrics / traces) with response-correlated</tspan><tspan x="80" dy="28">ack/nack.</tspan></text><text x="1234" y="104" text-anchor="end" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">grpc</text><text x="1520" y="104" text-anchor="end" font-size="17" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">GrpcClientSettings</text><text x="1234" y="126" text-anchor="end" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">compression_method</text><text x="1520" y="126" text-anchor="end" font-size="17" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">Option&lt;CompressionMethod&gt;</text><text x="1234" y="148" text-anchor="end" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">arrow</text><text x="1520" y="148" text-anchor="end" font-size="17" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">ArrowConfig</text><text x="1234" y="170" text-anchor="end" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">stream_queue_capacity</text><text x="1520" y="170" text-anchor="end" font-size="17" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">usize</text><text x="1234" y="192" text-anchor="end" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">streams_per_signal</text><text x="1520" y="192" text-anchor="end" font-size="17" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">usize</text><text x="1234" y="214" text-anchor="end" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">timeout</text><text x="1520" y="214" text-anchor="end" font-size="17" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">Option&lt;Duration&gt;</text><text x="880.0" y="310" text-anchor="middle" font-size="26" font-weight="700" fill="#1f2933">otap_exporter</text><g><rect x="520.0" y="328" width="720" height="320" rx="10" ry="10" fill="white" stroke="#52606d" stroke-width="1.6"/><rect x="520.0" y="328" width="720" height="6" rx="3" ry="3" fill="#52606d"/><text x="880.0" y="356" text-anchor="middle" font-size="26" font-weight="600" fill="#1f2933"></text></g><text x="540.0" y="366" font-size="20" fill="#1f2933">Per-signal stream tasks</text><text x="540.0" y="392" font-size="20" fill="#1f2933">Stream queue</text><text x="540.0" y="418" font-size="20" fill="#1f2933">In-flight response correlation map</text><text x="540.0" y="444" font-size="20" fill="#1f2933">Export latency window</text><text x="890.0" y="366" font-size="20" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">notify_ack</text><text x="890.0" y="392" font-size="20" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">notify_nack</text><text x="890.0" y="418" font-size="20" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">start_periodic_telemetry</text><line x1="80" y1="434.66666666666663" x2="520.0" y2="434.66666666666663" stroke="#52606d" stroke-width="3.0" stroke-linecap="round" marker-end="url(#ah-pdata)"/><line x1="1240.0" y1="434.66666666666663" x2="1520" y2="434.66666666666663" stroke="#52606d" stroke-width="3.0" stroke-linecap="round" marker-end="url(#ah-pdata)"/><g><rect x="434.0" y="400.66666666666663" width="76" height="28" rx="5" ry="5" fill="#4f7a8a" stroke="#4f7a8a"/><text x="472.0" y="419.66666666666663" text-anchor="middle" font-size="16" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="white">OTAP</text></g><line x1="1520" y1="562.6666666666666" x2="1240.0" y2="562.6666666666666" stroke="#52606d" stroke-width="1.4" marker-end="url(#ah-ctrl)"/><line x1="520.0" y1="562.6666666666666" x2="80" y2="562.6666666666666" stroke="#52606d" stroke-width="1.4" marker-end="url(#ah-ctrl)"/><text x="80" y="426.66666666666663" text-anchor="start" font-size="14" fill="#1f2933">PData</text><text x="80" y="554.6666666666666" text-anchor="start" font-size="14" fill="#1f2933">Ack/Nack</text><text x="1520" y="426.66666666666663" text-anchor="end" font-size="14" fill="#1f2933">OTAP / gRPC</text><text x="1520" y="554.6666666666666" text-anchor="end" font-size="14" fill="#1f2933">BatchStatus / gRPC</text><line x1="941.0" y1="682" x2="941.0" y2="656" stroke="#52606d" stroke-width="1.4" marker-end="url(#ah-ctrl)"/><line x1="963.0" y1="656" x2="963.0" y2="682" stroke="#52606d" stroke-width="1.4" marker-end="url(#ah-ctrl)"/><text x="930.0" y="700" font-size="14" font-style="italic" fill="#52606d">control</text><text x="930.0" y="722" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">CollectTelemetry</text><text x="930.0" y="744" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">Shutdown</text><line x1="1193.0" y1="656" x2="1193.0" y2="682" stroke="#52606d" stroke-width="1.4" marker-end="url(#ah-ctrl)"/><text x="1160.0" y="700" font-size="14" font-style="italic" fill="#52606d">ack/nack</text><text x="1160.0" y="722" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">Send</text><rect x="80" y="680" width="700" height="140" rx="10" ry="10" fill="#f4f6f8" stroke="#9aa5b1" stroke-width="1"/><text x="104" y="720" font-size="16" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">1.</text><text x="130" y="720" font-size="16" fill="#1f2933">Each signal runs streams_per_signal independent Arrow gRPC streams (default 1)</text><text x="130" y="740" font-size="16" fill="#1f2933">with stream_queue_capacity-bound enqueue.</text><text x="104" y="768" font-size="16" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">2.</text><text x="130" y="768" font-size="16" fill="#1f2933">Server BatchStatus responses are matched back to the originating OtapPdata via</text><text x="130" y="788" font-size="16" fill="#1f2933">a correlation queue; OK -&gt; notify_ack, anything else -&gt; notify_nack.</text><text x="104" y="816" font-size="16" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">3.</text><text x="130" y="816" font-size="16" fill="#1f2933">arrow.compression independently zstd-compresses Arrow IPC frames in addition</text><text x="130" y="836" font-size="16" fill="#1f2933">to gRPC compression (double compression by default).</text><text x="104" y="864" font-size="16" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">4.</text><text x="130" y="864" font-size="16" fill="#1f2933">OTLP-only inputs are rejected (notify_nack 'payload conversion failed'); use</text><text x="130" y="884" font-size="16" fill="#1f2933">otap_exporter only on the OTAP side of an ITR.</text><text x="104" y="912" font-size="16" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">5.</text><text x="130" y="912" font-size="16" fill="#1f2933">Latency window publishes p50/p90/p99 export.rpc.duration to the self-telemetry</text><text x="130" y="932" font-size="16" fill="#1f2933">async metrics.</text></svg>