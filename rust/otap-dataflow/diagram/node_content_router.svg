<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="850" viewBox="0 0 1600 850" font-family="Inter, 'Helvetica Neue', Arial, sans-serif"><rect width="1600" height="850" fill="#ffffff"/><defs><marker id="ah-pdata" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse" markerUnits="userSpaceOnUse"><path d="M0,0 L10,5 L0,10 z" fill="context-stroke"/></marker><marker id="ah-ctrl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse" markerUnits="userSpaceOnUse"><path d="M0,1 L10,5 L0,9" fill="none" stroke="context-stroke" stroke-width="1.4"/></marker></defs><rect x="80" y="80" width="1440" height="2" fill="#4f7a8a"/><text x="80" y="62" font-size="34" font-weight="600" fill="#1f2933">content_router</text><text x="1520" y="62" font-size="20" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d" text-anchor="end">urn:otel:processor:content_router</text><text x="80" y="120" font-size="24" font-style="italic" fill="#52606d"><tspan x="80" dy="0">Routes each batch to one named output port using a</tspan><tspan x="80" dy="28">resource attribute value.</tspan></text><text x="1320" y="104" text-anchor="end" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">routing_key</text><text x="1520" y="104" text-anchor="end" font-size="17" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">RoutingKeyExpr</text><text x="1320" y="126" text-anchor="end" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">routes</text><text x="1520" y="126" text-anchor="end" font-size="17" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">HashMap&lt;String, String&gt;</text><text x="1320" y="148" text-anchor="end" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">default_output</text><text x="1520" y="148" text-anchor="end" font-size="17" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">Option&lt;String&gt;</text><text x="1320" y="170" text-anchor="end" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">case_sensitive</text><text x="1520" y="170" text-anchor="end" font-size="17" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">bool</text><text x="1320" y="192" text-anchor="end" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">admission_policy</text><text x="1520" y="192" text-anchor="end" font-size="17" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#52606d">SelectedRouteAdmissionPolicy</text><text x="800.0" y="260" text-anchor="middle" font-size="26" font-weight="700" fill="#1f2933">content_router</text><g><rect x="440.0" y="278" width="720" height="320" rx="10" ry="10" fill="white" stroke="#52606d" stroke-width="1.6"/><rect x="440.0" y="278" width="720" height="6" rx="3" ry="3" fill="#4f7a8a"/><text x="800.0" y="306" text-anchor="middle" font-size="26" font-weight="600" fill="#1f2933"></text></g><text x="460.0" y="316" font-size="20" fill="#1f2933">Parked route messages</text><text x="460.0" y="342" font-size="20" fill="#1f2933">Local scheduler wakeups</text><text x="810.0" y="316" font-size="20" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">cancel_wakeup</text><text x="810.0" y="342" font-size="20" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">connected_ports</text><text x="810.0" y="368" font-size="20" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">notify_nack</text><text x="810.0" y="394" font-size="20" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">processor_id</text><text x="810.0" y="420" font-size="20" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">set_wakeup</text><text x="810.0" y="446" font-size="20" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">try_admit_message_to</text><line x1="80" y1="384.66666666666663" x2="440.0" y2="384.66666666666663" stroke="#4f7a8a" stroke-width="3.0" stroke-linecap="round" marker-end="url(#ah-pdata)"/><line x1="1160.0" y1="384.66666666666663" x2="1520" y2="384.66666666666663" stroke="#4f7a8a" stroke-width="3.0" stroke-linecap="round" marker-end="url(#ah-pdata)"/><g><rect x="1170.0" y="350.66666666666663" width="76" height="28" rx="5" ry="5" fill="#4f7a8a" stroke="#4f7a8a"/><text x="1208.0" y="369.66666666666663" text-anchor="middle" font-size="16" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="white">OTAP</text></g><g><rect x="1256.0" y="350.66666666666663" width="76" height="28" rx="5" ry="5" fill="#b15a4f" stroke="#b15a4f"/><text x="1294.0" y="369.66666666666663" text-anchor="middle" font-size="16" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="white">OTLP</text></g><line x1="1520" y1="512.6666666666666" x2="1160.0" y2="512.6666666666666" stroke="#52606d" stroke-width="1.4" marker-end="url(#ah-ctrl)"/><line x1="440.0" y1="512.6666666666666" x2="80" y2="512.6666666666666" stroke="#52606d" stroke-width="1.4" marker-end="url(#ah-ctrl)"/><text x="80" y="376.66666666666663" text-anchor="start" font-size="14" fill="#1f2933">PData</text><text x="80" y="504.66666666666663" text-anchor="start" font-size="14" fill="#1f2933">Ack/Nack</text><line x1="451.0" y1="632" x2="451.0" y2="606" stroke="#52606d" stroke-width="1.4" marker-end="url(#ah-ctrl)"/><line x1="473.0" y1="606" x2="473.0" y2="632" stroke="#52606d" stroke-width="1.4" marker-end="url(#ah-ctrl)"/><text x="440.0" y="650" font-size="14" font-style="italic" fill="#52606d">control</text><text x="440.0" y="672" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">CollectTelemetry</text><text x="440.0" y="694" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">Shutdown</text><text x="440.0" y="716" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">Wakeup</text><line x1="691.0" y1="632" x2="691.0" y2="606" stroke="#52606d" stroke-width="1.4" marker-end="url(#ah-ctrl)"/><line x1="713.0" y1="606" x2="713.0" y2="632" stroke="#52606d" stroke-width="1.4" marker-end="url(#ah-ctrl)"/><text x="680.0" y="650" font-size="14" font-style="italic" fill="#52606d">ack/nack</text><text x="680.0" y="672" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">Receive</text><text x="680.0" y="694" font-size="17" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">Send</text><rect x="820" y="640" width="700" height="180" rx="10" ry="10" fill="#f4f6f8" stroke="#9aa5b1" stroke-width="1"/><text x="844" y="680" font-size="16" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">1.</text><text x="870" y="680" font-size="16" fill="#1f2933">All resources in a batch must resolve to the same destination; mixed-route</text><text x="870" y="700" font-size="16" fill="#1f2933">batches are permanently nacked.</text><text x="844" y="728" font-size="16" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">2.</text><text x="870" y="728" font-size="16" fill="#1f2933">Unmatched or missing routing keys use default_output when configured,</text><text x="870" y="748" font-size="16" fill="#1f2933">otherwise the input is permanently nacked.</text><text x="844" y="776" font-size="16" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">3.</text><text x="870" y="776" font-size="16" fill="#1f2933">The router emits the original pdata format; Arrow metrics and traces may be</text><text x="870" y="796" font-size="16" fill="#1f2933">converted only for route inspection.</text><text x="844" y="824" font-size="16" font-weight="700" font-family="'JetBrains Mono', Menlo, Consolas, monospace" fill="#1f2933">4.</text><text x="870" y="824" font-size="16" fill="#1f2933">backpressure admission can park one message per blocked output port and retry</text><text x="870" y="844" font-size="16" fill="#1f2933">it from a local wakeup.</text></svg>