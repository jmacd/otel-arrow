# Pilot metric schema for internal telemetry (consumer/producer counters).
#
# This schema defines the self-observability metrics for pipeline nodes.
# Dimensions are declared at the metric_set level (not per-metric) because
# they map to OTAP scope attributes: each unique dimension combination
# becomes a scope ID, shared by all metrics in the set.

# Shared attribute definitions referenced by metrics below.
attributes:
  - id: outcome
    type: string
    brief: "Request processing outcome."
    values: [success, failure, refused]

  - id: signal_type
    type: string
    brief: "Telemetry signal type."
    values: [logs, metrics, traces]

# Metric set definitions.
metric_sets:
  - id: node_consumer
    brief: "Metrics for items consumed by a pipeline node."
    x-otap:
      levels:
        basic:
          dimensions: []
        normal:
          dimensions: [outcome]
        detailed:
          dimensions: [outcome, signal_type]
    metrics:
      - name: node.consumer.items
        instrument: counter
        unit: "{item}"
        brief: "Items consumed by this node."
        value_type: u64
        recording_mode: counting

      - name: node.consumer.duration
        instrument: counter
        unit: ns
        brief: "Time to consume items."
        value_type: f64
        recording_mode: histogram

  - id: node_producer
    brief: "Metrics for items produced by a pipeline node."
    x-otap:
      levels:
        basic:
          dimensions: []
        normal:
          dimensions: [outcome]
        detailed:
          dimensions: [outcome, signal_type]
    metrics:
      - name: node.producer.items
        instrument: counter
        unit: "{item}"
        brief: "Items produced by this node."
        value_type: u64
        recording_mode: counting

      - name: node.producer.duration
        instrument: counter
        unit: ns
        brief: "Time to produce items."
        value_type: f64
        recording_mode: histogram
