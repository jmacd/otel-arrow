# Use this changelog template to create an entry for release notes.

# One of 'breaking', 'deprecation', 'new_component', 'enhancement', 'bug_fix'
change_type: enhancement

# The name of the component, or a single word describing the area of concern, (e.g. engine, otap).
# Must be one of the components listed in rust/otap-dataflow/.chloggen/config.yaml.
component: engine

# A brief description of the change.  Surround your text with quotes ("") if it needs to start with a backtick (`).
note: Run the load-feedback placement scheduler for in-memory partition-dispatch topics, closing the load-balancing loop (durable-dispatch I4).

# Mandatory: One or more tracking issues related to the change. You can use the PR number here if no issue exists.
issues: [3359]

# (Optional) One or more lines of additional information to render under the primary note.
# These lines will be padded with 2 spaces and then inserted directly into the document.
# Use pipe (|) for multiline entries.
subtext: |
  The controller now creates a placement scheduler for each in-memory
  (`backend: in_memory`) partition-dispatch topic and ticks it on a background
  thread. Owners report their per-partition load through the topic binding's new
  load-report sender; the event-time windower reports its live series counts when
  its `report_load_to` config names the topic. On each tick the scheduler
  reconciles its model to the topic's real `partition -> owner` routing, so its
  owner indices match the topic's actual owner slots regardless of subscription
  order, then rebalances by shifting whole partitions off overloaded owners. The
  in-memory owner-queue routing carries the handoff, so no per-move receiver
  notification is needed. Durable (`backend: quiver`) placement reconciliation and
  an explicit subscription-level reassign entry point are deferred to the next
  slice.
