# Use this changelog template to create an entry for release notes.

# One of 'breaking', 'deprecation', 'new_component', 'enhancement', 'bug_fix'
change_type: enhancement

# The name of the component, or a single word describing the area of concern, (e.g. engine, otap).
# Must be one of the components listed in rust/otap-dataflow/.chloggen/config.yaml.
component: engine

# A brief description of the change.  Surround your text with quotes ("") if it needs to start with a backtick (`).
note: Run the load-feedback placement scheduler for durable (quiver) partition-dispatch topics, not only in-memory ones (durable-dispatch I4).

# Mandatory: One or more tracking issues related to the change. You can use the PR number here if no issue exists.
issues: [3359]

# (Optional) One or more lines of additional information to render under the primary note.
# These lines will be padded with 2 spaces and then inserted directly into the document.
# Use pipe (|) for multiline entries.
subtext: |
  `try_make_scheduler` no longer early-returns for a `backend: quiver`
  partition-dispatch topic, so the controller creates and ticks a
  `PlacementScheduler` for durable topics as it does for in-memory ones. On the
  first tick the coordinator reconciles to the durable topic's restored
  `placement.v1` overlay, so the scheduler's owner view agrees with the topic
  after a restart, closing the snapshot-reconciliation gap without a separate
  controller-side step. The scheduler balances at subscriber granularity (see the
  companion entry), so it is sized to the partition-dispatch receiver count for
  both backends.
