# Use this changelog template to create an entry for release notes.

# One of 'breaking', 'deprecation', 'new_component', 'enhancement', 'bug_fix'
change_type: enhancement

# The name of the component, or a single word describing the area of concern, (e.g. engine, otap).
# Must be one of the components listed in rust/otap-dataflow/.chloggen/config.yaml.
component: engine

# A brief description of the change.  Surround your text with quotes ("") if it needs to start with a backtick (`).
note: Move the durable partition-dispatch backend to one Quiver store per owner, configurable with `num_owners` (durable-dispatch D24).

# Mandatory: One or more tracking issues related to the change. You can use the PR number here if no issue exists.
issues: [3359]

# (Optional) One or more lines of additional information to render under the primary note.
# These lines will be padded with 2 spaces and then inserted directly into the document.
# Use pipe (|) for multiline entries.
subtext: |
  The durable (`backend: quiver`) partition-dispatch topic now uses one Quiver
  engine per owner instead of one per partition (durable-dispatch D24's
  production option). The `N` partitions are placed across `M` owners by a
  static `balanced(N, M)` map; each owner's store interleaves the partitions it
  holds, and the partition is stamped into a new generic, opaque per-bundle
  `user_meta` value that Quiver persists and returns on drain. A new optional
  `num_owners` field on the topic's `quiver` config block selects `M`
  (`1..=num_partitions`, default `num_partitions`, which reproduces the previous
  one-store-per-partition layout). A subscriber claims whole owner blocks.
