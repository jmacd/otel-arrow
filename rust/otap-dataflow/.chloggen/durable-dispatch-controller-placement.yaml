# Use this changelog template to create an entry for release notes.

# One of 'breaking', 'deprecation', 'new_component', 'enhancement', 'bug_fix'
change_type: enhancement

# The name of the component, or a single word describing the area of concern, (e.g. engine, otap).
# Must be one of the components listed in rust/otap-dataflow/.chloggen/config.yaml.
component: engine

# A brief description of the change.  Surround your text with quotes ("") if it needs to start with a backtick (`).
note: Compute the initial partition-dispatch placement in the controller so partition-dispatch receivers can omit owned_partitions (durable-dispatch I4).

# Mandatory: One or more tracking issues related to the change. You can use the PR number here if no issue exists.
issues: [3359]

# (Optional) One or more lines of additional information to render under the primary note.
# These lines will be padded with 2 spaces and then inserted directly into the document.
# Use pipe (|) for multiline entries.
subtext: |
  The `owned_partitions` field of a `topic` receiver's `partition_dispatch`
  subscription is now optional. When it is omitted, the controller treats every
  such receiver on a topic as a placement owner and assigns it a balanced share of
  the topic's `[0, num_partitions)` range via the same `PartitionPlacement::balanced`
  map the load-feedback coordinator starts from, writing each owner's share into
  its node config before the pipeline is resolved. Receivers that pin an explicit
  `owned_partitions` set keep it as an override, and a topic must not mix explicit
  and auto partition-dispatch receivers. This removes the need to hand-specify and
  hand-balance owned partitions across receiver replicas. Scheduler-driven
  reassignment and live owned-set propagation remain the follow-up half of I4.
