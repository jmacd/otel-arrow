# Use this changelog template to create an entry for release notes.

# One of 'breaking', 'deprecation', 'new_component', 'enhancement', 'bug_fix'
change_type: enhancement

# The name of the component, or a single word describing the area of concern, (e.g. engine, otap).
# Must be one of the components listed in rust/otap-dataflow/.chloggen/config.yaml.
component: engine

# A brief description of the change.  Surround your text with quotes ("") if it needs to start with a backtick (`).
note: Persist the durable partition-dispatch topic's routing overlay so partition reassignments survive process restart (durable-dispatch Phase 3).

# Mandatory: One or more tracking issues related to the change. You can use the PR number here if no issue exists.
issues: [3359]

# (Optional) One or more lines of additional information to render under the primary note.
# These lines will be padded with 2 spaces and then inserted directly into the document.
# Use pipe (|) for multiline entries.
subtext: |
  The dynamic `partition -> owner` routing overlay and per-partition lease
  generations of the durable (`backend: quiver`) partition-dispatch topic are now
  persisted as an atomically-rewritten snapshot at
  `{data_dir}/{topic}/placement.v1`. `reassign_partition` writes the updated map
  before the in-memory swap takes effect, so a reassignment is durable before it
  is observable, and `open()` restores it, falling back to the static `balanced`
  placement when the snapshot is absent or the topology (`num_partitions` /
  `num_owners`) changed. Previously the overlay was in-memory only, so a restart
  reverted every reassignment to the static placement and triggered a burst of
  drain-and-forward migration back to the static owners. The placement is a tiny
  map rewritten wholesale, so it is stored as a snapshot rather than through
  Quiver's stream-oriented WAL; the persist/load pair is a small seam that could
  be swapped for a Quiver-backed control stream later.
