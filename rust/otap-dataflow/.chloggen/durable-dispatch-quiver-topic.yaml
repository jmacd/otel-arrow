component: engine

# A brief description of the change.  Surround your text with quotes ("") if it needs to start with a backtick (`).
note: Add a durable, Quiver-backed partition-dispatch topic backend selectable with `backend: quiver` (durable-dispatch Layer B).

# Mandatory: One or more tracking issues related to the change. You can use the PR number here if no issue exists.
issues: [3359]

# (Optional) One or more lines of additional information to render under the primary note.
# These lines will be padded with 2 spaces and then inserted directly into the document.
# Use pipe (|) for multiline entries.
subtext: |
  Implements the deferred Layer B of the durable-dispatch design: the same
  partition-dispatch topic now runs over a durable backend behind the existing
  `TopicState` interface (durable-dispatch D27). A topic with `backend: quiver`
  and `num_partitions` persists each partition's stream to a per-partition Quiver
  store, so published data survives process restart and subscribers resume from
  durable progress; reassignment repoints a partition to a new owner that resumes
  from where the previous owner left off. New topic config: a `quiver` block with
  `data_dir`, `disk_budget_bytes`, and a `retention` policy (`backpressure` or
  `drop_oldest`). The OTAP-to-Quiver bundle adapter moved from the durable buffer
  processor into `otap_df_otap::quiver_bundle` so both share one implementation.
