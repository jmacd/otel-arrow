component: observability

# A brief description of the change.  Surround your text with quotes ("") if it needs to start with a backtick (`).
note: >-
  Add the integrated logs-and-traces reservoir sampler for internal telemetry to
  the `otap-df-telemetry` crate (`self_tracing::sampling`). It samples logs and
  spans together under fixed budgets and emits standard OpenTelemetry logs that
  carry their own sampling weights as three independent adjusted-count
  attributes with exact-zero semantics. The pieces are the Bottom-Floor weighted
  bottom-k sampler with Horvitz-Thompson correction and the rarest-seen floor, a
  span-start sampler driven by a wait-free `ArcSwap` threshold table with
  target-rate feedback, a windowed integrated processor that maintains the
  criterion-one global log sample, the criterion-two per-span reservoirs, and
  the span-start surprisal value table, and an all-CPU windowed aggregator that
  combines the per-worker sample buffers into one process-global sample over a
  channel to a single owner and republishes the span-start and heavy-hitter
  feedback tables through their `ArcSwap`s. The aggregator is built into the
  Internal Telemetry Receiver, which owns it behind an `integrated_sampling`
  config flag, ingests the worker flushes, and emits the aggregated sample as
  OTLP on each telemetry-collection tick. Both feedback loops are closed over a
  process-global registry: the tracer's default sampler reads the span-start
  table, and each worker's criterion one applies the heavy-hitter binding gate,
  both fail-safe no-ops until the aggregator publishes.

# Mandatory: One or more tracking issues related to the change. You can use the PR number here if no issue exists.
issues: [2405]

# (Optional) One or more lines of additional information to render under the primary note.
# These lines will be padded with 2 spaces and then inserted directly into the document.
# Use pipe (|) for multiline entries.
subtext: >-
  This version provides the sampling library, its statistical core, the
  intra-process two-level engine mechanism, and both closed feedback loops
  (the tracer span-start sampler and the worker heavy-hitter binding gate over a
  process-global registry), validated per-crate. The all-CPU aggregator is built
  into the Internal Telemetry Receiver and enabled by its `integrated_sampling`
  config. Smoothing the global counts across windows and the cross-process
  two-level log feedback are follow-ups. See
  docs/integrated-logs-traces-reservoir.md and
  docs/integrated-sampler-engine-mechanism.md for the design.
